meta:
  data_dir: ./dummy_data
  experiment_name: test_experiment
model:
  dropout: 0.0
  freeze_backbone_epochs: 1
  model_name: maskrcnn-resnet50_fpn
  num_classes: 2
  # Embedding mode controls both the geometric reference used for the vector
  # field and the instance-separation strategy used at inference time.
  # Valid values (only meaningful for InstanSeg_UNet models, ignored for Mask R-CNN):
  #   center-seed     – center-relative vectors + seed-based differentiation (default)
  #   border-seed     – border-relative vectors + seed-based differentiation
  #   center-cluster  – center-relative vectors + graph-clustering differentiation
  #   border-cluster  – border-relative vectors + graph-clustering differentiation
  #   combined-center – both vector fields      + seed-based differentiation
  #   combined-cluster– both vector fields      + graph-clustering differentiation
  embedding_mode: center-seed
optimizer:
  backbone_lr_mult: 0.1
  learning_rate: 0.001
  momentum: 0.9
  weight_decay: 0.0001
preprocessing:
  imgsz: 128
  seed: 42
  train_data_ratio: 1.0
training:
  batch_size: 2
  epochs: 2
  patience: 2
  resume: false
  test_ratio: 0.2
  val_interval: 1
  val_ratio: 0.2
  warmup_epochs: 1
  save_kgl_ckp: false
  kgl_best_ckp_path: null
  kgl_last_ckp_path: null
  kgl_ckp_freq: 1
  kgl_creds_path: null
